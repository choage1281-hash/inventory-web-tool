<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>進銷存工具 V1‑5</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoA6VUF2KfQ/n6t5v4IfW3vZL5F1KNEFrGf6Zp2a3rQe1dC"
    crossorigin="anonymous"
  />
  <style>
    body {
      padding: 2rem;
    }
    h2 {
      margin-top: 2rem;
    }
    .form-section {
      margin-bottom: 2rem;
      padding: 1rem;
      border: 1px solid #ddd;
      border-radius: 0.5rem;
      background-color: #f9f9f9;
    }
    .table-wrapper {
      max-height: 300px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4">進銷存工具 V1‑5</h1>
    <p>本頁面提供基本的 Web 介面，用於呼叫後端 API 進行商品、倉庫、進貨、銷貨及庫存管理。</p>

    <!-- Item Management -->
    <h2>商品管理</h2>
    <div class="form-section" id="item-section">
      <h5>新增商品</h5>
      <!--
        在 V1‑5 版本中，商品新增功能改為類似 Excel 的表格式，
        使用者可以於表格中輸入多筆商品資料後一次送出。
        欄位包括：名稱、數量、類別、尺寸與說明。送出時會將名稱作為 SKU 之預設值，
        數量對應後端的 safety_stock，類別對應 category，尺寸對應 unit，說明對應 description。
        若需要調整欄位對應，可根據後端模型修改 saveItems 函式。
      -->
      <div id="itemLinesContainer">
        <table class="table table-bordered table-sm">
          <thead>
            <tr>
              <th>名稱</th>
              <th>數量</th>
              <th>類別</th>
              <th>尺寸</th>
              <th>說明</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="itemLines">
            <!-- 動態加入的商品輸入列 -->
          </tbody>
        </table>
        <div class="mb-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" id="addItemLine">新增列</button>
          <button type="button" class="btn btn-primary" id="saveItems">儲存商品</button>
        </div>
      </div>
    </div>
    <div class="form-section">
      <h5>現有商品</h5>
      <button id="loadItems" class="btn btn-secondary mb-2">重新載入</button>
      <div class="table-wrapper">
        <table class="table table-bordered table-sm" id="itemsTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>SKU</th>
              <th>名稱</th>
              <th>單位</th>
              <th>分類</th>
              <th>安全庫存</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Warehouse Management -->
    <h2>倉庫管理</h2>
    <div class="form-section" id="warehouse-section">
      <h5>新增倉庫</h5>
      <!-- 在 V1‑5 中，倉庫新增改為類似 Excel 的表格輸入 -->
      <div id="warehouseLinesContainer">
        <table class="table table-bordered table-sm">
          <thead>
            <tr>
              <th>名稱</th>
              <th>位置</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="warehouseLines">
            <!-- 動態加入的倉庫輸入列 -->
          </tbody>
        </table>
        <div class="mb-2">
          <button type="button" class="btn btn-sm btn-outline-secondary" id="addWarehouseLine">新增列</button>
          <button type="button" class="btn btn-primary" id="saveWarehouses">儲存倉庫</button>
        </div>
      </div>
    </div>
    <div class="form-section">
      <h5>現有倉庫</h5>
      <button id="loadWarehouses" class="btn btn-secondary mb-2">重新載入</button>
      <div class="table-wrapper">
        <table class="table table-bordered table-sm" id="warehousesTable">
          <thead>
            <tr>
              <th>ID</th>
              <th>名稱</th>
              <th>位置</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- Purchase Order -->
    <h2>建立進貨單</h2>
    <div class="form-section">
      <form id="purchaseForm">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="purchaseWarehouse" class="form-label">倉庫 ID*</label>
            <input type="number" class="form-control" id="purchaseWarehouse" required />
          </div>
          <div class="col-md-4">
            <label for="purchaseSupplier" class="form-label">供應商 ID（可選）</label>
            <input type="number" class="form-control" id="purchaseSupplier" />
          </div>
        </div>
        <div class="mt-3">
          <h6>商品明細</h6>
          <!-- 在 V1‑5 中，進貨明細改為表格輸入 -->
          <table class="table table-bordered table-sm">
            <thead>
              <tr>
                <th>商品ID</th>
                <th>數量</th>
                <th>單價</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="purchaseLines">
              <!-- 動態加入的進貨明細列 -->
            </tbody>
          </table>
          <button type="button" class="btn btn-sm btn-outline-secondary" id="addPurchaseLine">新增列</button>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary">送出進貨單</button>
        </div>
      </form>
    </div>

    <!-- Sales Order -->
    <h2>建立銷貨單</h2>
    <div class="form-section">
      <form id="salesForm">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="salesWarehouse" class="form-label">倉庫 ID*</label>
            <input type="number" class="form-control" id="salesWarehouse" required />
          </div>
          <div class="col-md-4">
            <label for="salesCustomer" class="form-label">客戶 ID（可選）</label>
            <input type="number" class="form-control" id="salesCustomer" />
          </div>
        </div>
        <div class="mt-3">
          <h6>商品明細</h6>
          <!-- 在 V1‑5 中，銷貨明細改為表格輸入 -->
          <table class="table table-bordered table-sm">
            <thead>
              <tr>
                <th>商品ID</th>
                <th>數量</th>
                <th>售價</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="salesLines">
              <!-- 動態加入的銷貨明細列 -->
            </tbody>
          </table>
          <button type="button" class="btn btn-sm btn-outline-secondary" id="addSalesLine">新增列</button>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary">送出銷貨單</button>
        </div>
      </form>
    </div>

    <!-- Inventory -->
    <h2>庫存查詢</h2>
    <div class="form-section">
      <div class="row g-3 align-items-end">
        <div class="col-md-3">
          <label for="inventoryWarehouse" class="form-label">倉庫 ID（留空查全部）</label>
          <input type="number" class="form-control" id="inventoryWarehouse" />
        </div>
        <div class="col-md-2">
          <button id="loadInventory" class="btn btn-secondary">查詢庫存</button>
        </div>
      </div>
      <div class="table-wrapper mt-3">
        <table class="table table-bordered table-sm" id="inventoryTable">
          <thead>
            <tr>
              <th>商品 ID</th>
              <th>名稱</th>
              <th>庫存量</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>

  <script>
    // 設定後端 API 的基底網址。當部署到 GitHub Pages 時，請將以下 URL
    // 修改為您自己的後端服務域名，並確保使用 HTTPS。例如：
    // const apiBase = "https://api.example.com";
    // 預設使用下方的範例網址，部署後請替換為實際的 API 網域，以避免「Failed to fetch」錯誤。
    const apiBase = "https://your-backend-api.com"; // 您可以將此網址替換為部署好的後端服務。

    // Helper: create element from HTML string
    function createElement(html) {
      const template = document.createElement('template');
      template.innerHTML = html.trim();
      return template.content.firstChild;
    }

    // ITEM management
    // 在 V1‑5 中移除傳統的表單提交方式，改為 Excel 風格的輸入列。
    // 定義函式以動態新增商品輸入列，並處理儲存行為。

    // 新增一列商品輸入欄位
    function addItemLine() {
      const tbody = document.getElementById('itemLines');
      const tr = document.createElement('tr');
      tr.classList.add('item-line');
      tr.innerHTML = `
        <td><input type="text" class="form-control form-control-sm item-name" placeholder="名稱" required></td>
        <td><input type="number" class="form-control form-control-sm item-qty" placeholder="數量" min="0"></td>
        <td><input type="text" class="form-control form-control-sm item-category" placeholder="類別"></td>
        <td><input type="text" class="form-control form-control-sm item-size" placeholder="尺寸"></td>
        <td><input type="text" class="form-control form-control-sm item-desc" placeholder="說明"></td>
        <td class="text-center"><button type="button" class="btn btn-sm btn-link text-danger remove-item-line">移除</button></td>
      `;
      tbody.appendChild(tr);
    }

    // 點擊新增列按鈕時新增一行
    document.getElementById('addItemLine').addEventListener('click', addItemLine);

    // 移除列的事件監聽
    document.getElementById('itemLines').addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('remove-item-line')) {
        e.target.closest('tr').remove();
      }
    });

    // 儲存商品按鈕事件
    document.getElementById('saveItems').addEventListener('click', async () => {
      const rows = document.querySelectorAll('#itemLines .item-line');
      if (rows.length === 0) {
        alert('請先新增商品列');
        return;
      }
      let successCount = 0;
      for (const row of rows) {
        // 取得各欄位值
        const name = row.querySelector('.item-name').value.trim();
        if (!name) continue; // 名稱為必要欄位
        const qtyVal = row.querySelector('.item-qty').value;
        const qty = qtyVal ? parseInt(qtyVal) : undefined;
        const category = row.querySelector('.item-category').value.trim() || undefined;
        const size = row.querySelector('.item-size').value.trim() || undefined;
        const desc = row.querySelector('.item-desc').value.trim() || undefined;
        // 將名稱作為 SKU 以符合後端需求（若需要可更換為其他邏輯）
        const payload = {
          sku: name,
          name: name,
          unit: size || undefined,
          barcode: undefined,
          category: category,
          safety_stock: qty,
          description: desc
        };
        try {
          const res = await fetch(`${apiBase}/items`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            successCount++;
          } else {
            // 若後端返回錯誤仍繼續處理其他列
            console.error('新增商品失敗', await res.text());
          }
        } catch (err) {
          console.error('呼叫 API 失敗', err);
        }
      }
      if (successCount > 0) {
        alert(`成功新增 ${successCount} 筆商品`);
        // 清空輸入列並加入一行空白列供下一次新增
        document.getElementById('itemLines').innerHTML = '';
        addItemLine();
        loadItems();
      } else {
        alert('沒有成功新增的商品，請檢查輸入');
      }
    });

    // 頁面載入時預先加入一列輸入欄
    document.addEventListener('DOMContentLoaded', () => {
      // 頁面載入時加入初始輸入列
      addItemLine();
      addWarehouseLine();
    });

    async function loadItems() {
      const tbody = document.querySelector('#itemsTable tbody');
      tbody.innerHTML = '';
      try {
        const res = await fetch(`${apiBase}/items`);
        const items = await res.json();
        items.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${item.id}</td><td>${item.sku}</td><td>${item.name}</td><td>${item.unit || ''}</td><td>${item.category || ''}</td><td>${item.safety_stock || ''}</td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
      }
    }
    document.getElementById('loadItems').addEventListener('click', loadItems);
    // Load on page load
    loadItems();

    // WAREHOUSE management
    // 在 V1‑5 中，倉庫新增改為表格輸入。定義動態新增/移除列與儲存行為。
    function addWarehouseLine() {
      const tbody = document.getElementById('warehouseLines');
      const tr = document.createElement('tr');
      tr.classList.add('warehouse-line');
      tr.innerHTML = `
        <td><input type="text" class="form-control form-control-sm warehouse-name" placeholder="名稱" required></td>
        <td><input type="text" class="form-control form-control-sm warehouse-location" placeholder="位置"></td>
        <td class="text-center"><button type="button" class="btn btn-sm btn-link text-danger remove-warehouse-line">移除</button></td>
      `;
      tbody.appendChild(tr);
    }
    document.getElementById('addWarehouseLine').addEventListener('click', addWarehouseLine);
    document.getElementById('warehouseLines').addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('remove-warehouse-line')) {
        e.target.closest('tr').remove();
      }
    });
    document.getElementById('saveWarehouses').addEventListener('click', async () => {
      const rows = document.querySelectorAll('#warehouseLines .warehouse-line');
      if (rows.length === 0) {
        alert('請先新增倉庫列');
        return;
      }
      let successCount = 0;
      for (const row of rows) {
        const name = row.querySelector('.warehouse-name').value.trim();
        if (!name) continue;
        const location = row.querySelector('.warehouse-location').value.trim() || undefined;
        const payload = { name: name, location: location };
        try {
          const res = await fetch(`${apiBase}/warehouses`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (res.ok) {
            successCount++;
          } else {
            console.error('新增倉庫失敗', await res.text());
          }
        } catch (err) {
          console.error('呼叫 API 失敗', err);
        }
      }
      if (successCount > 0) {
        alert(`成功新增 ${successCount} 筆倉庫`);
        document.getElementById('warehouseLines').innerHTML = '';
        addWarehouseLine();
        loadWarehouses();
      } else {
        alert('沒有成功新增的倉庫，請檢查輸入');
      }
    });

    async function loadWarehouses() {
      const tbody = document.querySelector('#warehousesTable tbody');
      tbody.innerHTML = '';
      try {
        const res = await fetch(`${apiBase}/warehouses`);
        const warehouses = await res.json();
        warehouses.forEach(wh => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${wh.id}</td><td>${wh.name}</td><td>${wh.location || ''}</td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
      }
    }
    document.getElementById('loadWarehouses').addEventListener('click', loadWarehouses);
    loadWarehouses();

    // Purchase order lines helper
    // 在 V1‑5 中，進貨明細改為表格輸入。
    function addPurchaseLine() {
      const tbody = document.getElementById('purchaseLines');
      const tr = document.createElement('tr');
      tr.classList.add('purchase-line');
      tr.innerHTML = `
        <td><input type="number" class="form-control form-control-sm purchase-item-id" placeholder="商品ID" required /></td>
        <td><input type="number" class="form-control form-control-sm purchase-qty" placeholder="數量" min="1" required /></td>
        <td><input type="number" class="form-control form-control-sm purchase-price" placeholder="單價" min="0" step="0.01" required /></td>
        <td class="text-center"><button type="button" class="btn btn-sm btn-link text-danger remove-purchase-line">移除</button></td>
      `;
      tbody.appendChild(tr);
    }
    document.getElementById('addPurchaseLine').addEventListener('click', addPurchaseLine);
    document.getElementById('purchaseLines').addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('remove-purchase-line')) {
        e.target.closest('tr').remove();
      }
    });
    // 初始加入一行
    addPurchaseLine();

    document.getElementById('purchaseForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const warehouseId = parseInt(document.getElementById('purchaseWarehouse').value);
      const supplierId = document.getElementById('purchaseSupplier').value;
      const linesEls = document.querySelectorAll('#purchaseLines .purchase-line');
      const lines = [];
      linesEls.forEach(el => {
        const itemId = parseInt(el.querySelector('.purchase-item-id').value);
        const qty = parseInt(el.querySelector('.purchase-qty').value);
        const price = parseFloat(el.querySelector('.purchase-price').value);
        lines.push({
          item_id: itemId,
          quantity: qty,
          unit_price: price
        });
      });
      const payload = {
        warehouse_id: warehouseId,
        supplier_id: supplierId ? parseInt(supplierId) : undefined,
        lines: lines
      };
      try {
        const res = await fetch(`${apiBase}/purchase_orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('進貨單建立失敗');
        alert('進貨單建立成功');
        // Reset form and table
        document.getElementById('purchaseForm').reset();
        document.getElementById('purchaseLines').innerHTML = '';
        addPurchaseLine();
        loadInventory();
      } catch (err) {
        alert(err.message);
      }
    });

    // Sales order lines helper
    // 在 V1‑5 中，銷貨明細改為表格輸入。
    function addSalesLine() {
      const tbody = document.getElementById('salesLines');
      const tr = document.createElement('tr');
      tr.classList.add('sales-line');
      tr.innerHTML = `
        <td><input type="number" class="form-control form-control-sm sales-item-id" placeholder="商品ID" required /></td>
        <td><input type="number" class="form-control form-control-sm sales-qty" placeholder="數量" min="1" required /></td>
        <td><input type="number" class="form-control form-control-sm sales-price" placeholder="售價" min="0" step="0.01" required /></td>
        <td class="text-center"><button type="button" class="btn btn-sm btn-link text-danger remove-sales-line">移除</button></td>
      `;
      tbody.appendChild(tr);
    }
    document.getElementById('addSalesLine').addEventListener('click', addSalesLine);
    document.getElementById('salesLines').addEventListener('click', (e) => {
      if (e.target && e.target.classList.contains('remove-sales-line')) {
        e.target.closest('tr').remove();
      }
    });
    // 初始加入一行
    addSalesLine();

    document.getElementById('salesForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const warehouseId = parseInt(document.getElementById('salesWarehouse').value);
      const customerId = document.getElementById('salesCustomer').value;
      const linesEls = document.querySelectorAll('#salesLines .sales-line');
      const lines = [];
      linesEls.forEach(el => {
        const itemId = parseInt(el.querySelector('.sales-item-id').value);
        const qty = parseInt(el.querySelector('.sales-qty').value);
        const price = parseFloat(el.querySelector('.sales-price').value);
        lines.push({
          item_id: itemId,
          quantity: qty,
          unit_price: price
        });
      });
      const payload = {
        warehouse_id: warehouseId,
        customer_id: customerId ? parseInt(customerId) : undefined,
        lines: lines
      };
      try {
        const res = await fetch(`${apiBase}/sales_orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) throw new Error('銷貨單建立失敗');
        alert('銷貨單建立成功');
        document.getElementById('salesForm').reset();
        document.getElementById('salesLines').innerHTML = '';
        addSalesLine();
        loadInventory();
      } catch (err) {
        alert(err.message);
      }
    });

    // Inventory query
    async function loadInventory() {
      const warehouseId = document.getElementById('inventoryWarehouse').value;
      let url = `${apiBase}/inventory`;
      if (warehouseId) {
        url += `?warehouse_id=${parseInt(warehouseId)}`;
      }
      const tbody = document.querySelector('#inventoryTable tbody');
      tbody.innerHTML = '';
      try {
        const res = await fetch(url);
        const inventory = await res.json();
        inventory.forEach(row => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${row.item_id}</td><td>${row.item_name}</td><td>${row.quantity}</td>`;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
      }
    }
    document.getElementById('loadInventory').addEventListener('click', (e) => {
      e.preventDefault();
      loadInventory();
    });
    // initial load
    loadInventory();
  </script>
</body>
</html>
